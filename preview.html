function Badge({ children, color = "accent", small }) {
  const styles = {
    accent: { bg: COLORS.accentBg, color: COLORS.accent },
    success: { bg: COLORS.successBg, color: COLORS.success },
    warning: { bg: "#fef3c7", color: "#92400e" },
    danger: { bg: COLORS.dangerBg, color: COLORS.danger },
    gray: { bg: COLORS.light, color: COLORS.muted },
  };
  const s = styles[color] || styles.accent;
  return (
    <span style={{ background: s.bg, color: s.color, padding: small ? "2px 8px" : "4px 12px", borderRadius: 20, fontSize: small ? 11 : 12, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.3 }}>
      {children}
    </span>
  );
}

function QRCode({ value, size = 120 }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext("2d");
    const cells = 21;
    const cellSize = size / cells;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, size, size);
    const hash = value.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
    ctx.fillStyle = "#0f172a";
    for (let r = 0; r < cells; r++) {
      for (let c = 0; c < cells; c++) {
        const isFinderTopLeft = r < 7 && c < 7;
        const isFinderTopRight = r < 7 && c >= cells - 7;
        const isFinderBottomLeft = r >= cells - 7 && c < 7;
        if (isFinderTopLeft || isFinderTopRight || isFinderBottomLeft) {
          const rr = isFinderTopLeft ? r : isFinderTopRight ? r : r - (cells - 7);
          const cc = isFinderTopLeft ? c : isFinderTopRight ? c - (cells - 7) : c;
          if (rr === 0 || rr === 6 || cc === 0 || cc === 6 || (rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4)) {
            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          }
        } else {
          const seed = (r * cells + c + hash) * 1103515245;
          if ((seed >> 16) & 1) ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
        }
      }
    }
  }, [value, size]);
  return <canvas ref={canvasRef} width={size} height={size} style={{ borderRadius: 8, border: `1px solid ${COLORS.border}` }} />;
}

function StarRating({ rating }) {
  return (
    <span style={{ display: "inline-flex", gap: 2, alignItems: "center" }}>
      {[1, 2, 3, 4, 5].map(i => (
        <span key={i} style={{ color: i <= Math.round(rating) ? COLORS.warning : COLORS.border, fontSize: 14 }}>★</span>
      ))}
      <span style={{ fontSize: 13, color: COLORS.muted, marginLeft: 4, fontFamily: "'DM Sans', sans-serif" }}>{rating}</span>
    </span>
  );
}

function ProgressBar({ value, max, color = COLORS.accent }) {
  const pct = Math.min(100, Math.round((value / max) * 100));
  return (
    <div style={{ background: COLORS.light, borderRadius: 99, height: 6, overflow: "hidden" }}>
      <div style={{ width: `${pct}%`, background: color, height: "100%", borderRadius: 99, transition: "width 0.5s" }} />
    </div>
  );
}

function Modal({ open, onClose, children, title, width = 560 }) {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 20 }} onClick={onClose}>
      <div style={{ background: COLORS.card, borderRadius: 20, width: "100%", maxWidth: width, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.25)" }} onClick={e => e.stopPropagation()}>
        <div style={{ padding: "24px 28px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <h2 style={{ margin: 0, fontFamily: "'Syne', sans-serif", fontSize: 20, fontWeight: 700 }}>{title}</h2>
          <button onClick={onClose} style={{ background: COLORS.light, border: "none", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 18, color: COLORS.muted, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
        </div>
        <div style={{ padding: 28 }}>{children}</div>
      </div>
    </div>
  );
}

  return (

      <input {...props} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: COLORS.text, background: COLORS.bg, outline: "none", boxSizing: "border-box", ...props.style }} />
    </div>
  );
}

function Textarea({ label, ...props }) {

}

function Select({ label, children, ...props }) {

      {label && <label style={{ display: "block", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, color: COLORS.muted, marginBottom: 6 }}>{label}</label>}
      <select {...props} style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: COLORS.text, background: COLORS.bg, outline: "none", boxSizing: "border-box" }}>
        {children}
      </select>
    </div>

}

function Btn({ children, onClick, variant = "primary", small, disabled, style: s }) {
  const variants = {
    primary: { background: COLORS.accent, color: "#fff", border: "none" },
    outline: { background: "transparent", color: COLORS.accent, border: `1.5px solid ${COLORS.accent}` },
    ghost: { background: "transparent", color: COLORS.muted, border: `1.5px solid ${COLORS.border}` },
    danger: { background: COLORS.danger, color: "#fff", border: "none" },
    success: { background: COLORS.success, color: "#fff", border: "none" },
  };
  return (
    <button onClick={onClick} disabled={disabled} style={{ ...variants[variant], padding: small ? "8px 16px" : "11px 22px", borderRadius: 10, fontFamily: "'DM Sans', sans-serif", fontSize: small ? 13 : 14, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.5 : 1, transition: "all 0.15s", display: "inline-flex", alignItems: "center", gap: 6, ...s }}>
      {children}
    </button>
  );
}

    </div>
  );
}

  const totalRevenue = events.reduce((sum, e) => sum + e.tickets.reduce((s, t) => s + t.price * t.sold, 0), 0);
  const totalAttendees = events.reduce((sum, e) => sum + e.tickets.reduce((s, t) => s + t.sold, 0), 0);

  const handleCheckin = () => {
    if (!checkinCode.trim()) return;
    if (checkedIn.includes(checkinCode)) {
      setCheckinMsg({ type: "warning", text: "Already checked in!" });
    } else {
      setCheckedIn(c => [...c, checkinCode]);
      setCheckinMsg({ type: "success", text: `✓ Checked in: ${checkinCode}` });
    }

  const generateAIDescription = async () => {

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: `You are an expert event copywriter. Convert these bullet points into a compelling, polished event description (2-3 paragraphs, no markdown):\n\n${newEvent.bulletPoints}` }]

function AIRecommendations({ events, wishlist, bookings }) {
  const [recommendations, setRecommendations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [schedule, setSchedule] = useState(null);
  const [scheduleLoading, setScheduleLoading] = useState(false);

  const getRecommendations = async () => {
    setLoading(true);
    const booked = bookings.map(b => b.eventName);
    const wishlisted = events.filter(e => wishlist.includes(e.id)).map(e => e.name);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: `You are an event recommendation AI. Based on:\nAttended: ${booked.join(", ") || "none"}\nWishlisted: ${wishlisted.join(", ") || "none"}\nAvailable events: ${events.map(e => e.name + " (" + e.category + ")").join(", ")}\n\nRespond ONLY with a JSON array of 3 objects: [{id: number, reason: string}]. No markdown, no explanation.` }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type === "text")?.text || "[]";
      const clean = text.replace(/```json|```/g, "").trim();
      const recs = JSON.parse(clean);
      setRecommendations(recs);
    } catch {
      setRecommendations(events.slice(0, 3).map(e => ({ id: e.id, reason: "Trending in your area" })));
    }
    setLoading(false);
  };

  const buildSmartSchedule = async () => {
    setScheduleLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: `You are a conference schedule optimizer. Given these sessions: Opening (60min, speaker: CEO), AI Workshop (90min, hands-on, morning preferred), Lunch Break (45min, fixed at 1pm), Networking (60min, afternoon), Closing Ceremony (30min, last). Suggest optimal ordering for best audience flow and speaker availability. Respond as JSON array: [{time: string, title: string, duration: string, reason: string}]. No markdown.` }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b => b.type === "text")?.text || "[]";
      const clean = text.replace(/```json|```/g, "").trim();
      setSchedule(JSON.parse(clean));
    } catch {
      setSchedule([{ time: "9:00 AM", title: "Opening", duration: "60min", reason: "Sets the tone" }, { time: "10:00 AM", title: "AI Workshop", duration: "90min", reason: "Peak energy time" }]);
    }
    setScheduleLoading(false);
  };

  return (
    <div>
      <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, fontWeight: 800, marginBottom: 8 }}>AI Features</h2>
      <p style={{ fontFamily: "'DM Sans', sans-serif", color: COLORS.muted, marginBottom: 28 }}>Powered by Claude AI</p>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div style={{ background: COLORS.card, borderRadius: 16, border: `1px solid ${COLORS.border}`, padding: 24 }}>
          <div style={{ fontSize: 28, marginBottom: 12 }}>🎯</div>
          <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 16, fontWeight: 700, margin: "0 0 8px" }}>Event Recommendations</h3>
          <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: COLORS.muted, marginBottom: 16 }}>Based on your past activity and wishlist, Claude suggests events you'll love.</p>
          <Btn onClick={getRecommendations} disabled={loading} small>{loading ? "⏳ Thinking..." : "Get Recommendations"}</Btn>
          {recommendations.length > 0 && (
            <div style={{ marginTop: 16 }}>
              {recommendations.map((r, i) => {
                const e = events.find(ev => ev.id === r.id);
                if (!e) return null;
                return (
                  <div key={i} style={{ background: COLORS.bg, borderRadius: 10, padding: 14, marginBottom: 10 }}>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600 }}>{e.name}</div>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: COLORS.accent, marginTop: 4 }}>✨ {r.reason}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={{ background: COLORS.card, borderRadius: 16, border: `1px solid ${COLORS.border}`, padding: 24 }}>
          <div style={{ fontSize: 28, marginBottom: 12 }}>🗓️</div>
          <h3 style={{ fontFamily: "'Syne', sans-serif", fontSize: 16, fontWeight: 700, margin: "0 0 8px" }}>Smart Schedule Builder</h3>
          <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: COLORS.muted, marginBottom: 16 }}>AI suggests optimal session ordering based on speaker availability and audience energy.</p>
          <Btn onClick={buildSmartSchedule} disabled={scheduleLoading} small>{scheduleLoading ? "⏳ Optimizing..." : "Build Schedule"}</Btn>
          {schedule && (
            <div style={{ marginTop: 16 }}>
              {schedule.map((s, i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, alignItems: "flex-start" }}>
                  <div style={{ background: COLORS.accentBg, borderRadius: 8, padding: "6px 10px", minWidth: 72, textAlign: "center", fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 600, color: COLORS.accent }}>{s.time}</div>
                  <div>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500 }}>{s.title}</div>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: COLORS.muted }}>{s.reason}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function EventSphere() {
  const [page, setPage] = useState("browse");
  const [events] = useState(initialEvents);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [wishlist, setWishlist] = useState([]);
  const [bookings, setBookings] = useState([]);
  const [checkoutData, setCheckoutData] = useState(null);
  const [showCheckout, setShowCheckout] = useState(false);
  const [filters, setFilters] = useState({ category: "All", city: "", type: "all", price: "all", search: "" });
  const [notifications, setNotifications] = useState([{ id: 1, text: "DevFusion Hackathon starts in 3 days!", time: "2h ago" }, { id: 2, text: "Your ticket for AI Summit is confirmed.", time: "1d ago" }]);

  const toggleWishlist = (id) => {
    setWishlist(w => w.includes(id) ? w.filter(x => x !== id) : [...w, id]);
  };

  const filteredEvents = events.filter(e => {
    if (filters.category !== "All" && e.category !== filters.category) return false;
    if (filters.city && !e.city.toLowerCase().includes(filters.city.toLowerCase())) return false;
    if (filters.type !== "all" && e.type !== filters.type) return false;
    if (filters.price === "free" && Math.min(...e.tickets.map(t => t.price)) > 0) return false;
    if (filters.price === "paid" && Math.min(...e.tickets.map(t => t.price)) === 0) return false;
    if (filters.search && !e.name.toLowerCase().includes(filters.search.toLowerCase()) && !e.tags.join(" ").toLowerCase().includes(filters.search.toLowerCase())) return false;
    return true;
  });

  const navItems = [
    { id: "browse", label: "Browse Events", icon: "🔍" },
    { id: "tickets", label: "My Tickets", icon: "🎟️", badge: bookings.length },
    { id: "wishlist", label: "Wishlist", icon: "❤️", badge: wishlist.length },
    { id: "organiser", label: "Dashboard", icon: "📊" },
    { id: "ai", label: "AI Features", icon: "✨" },
  ];

  return (
    <>
      <style>{FONTS}</style>
      <div style={{ minHeight: "100vh", background: COLORS.bg, fontFamily: "'DM Sans', sans-serif" }}>
        <header style={{ background: COLORS.card, borderBottom: `1px solid ${COLORS.border}`, position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 64 }}>
            <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 800, color: COLORS.text }}>
              Event<span style={{ color: COLORS.accent }}>Sphere</span>
            </div>
            <nav style={{ display: "flex", gap: 4 }}>
              {navItems.map(item => (
                <button key={item.id} onClick={() => { setPage(item.id); setSelectedEvent(null); }} style={{ background: page === item.id ? COLORS.accentBg : "transparent", color: page === item.id ? COLORS.accent : COLORS.muted, border: "none", borderRadius: 8, padding: "8px 14px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: page === item.id ? 600 : 400, display: "flex", alignItems: "center", gap: 6, position: "relative" }}>
                  {item.icon} {item.label}
                  {item.badge > 0 && <span style={{ background: COLORS.accent, color: "#fff", borderRadius: 10, fontSize: 10, fontWeight: 700, padding: "1px 6px", minWidth: 16, textAlign: "center" }}>{item.badge}</span>}
                </button>
              ))}
            </nav>
            <div style={{ position: "relative" }}>
              <button style={{ background: COLORS.bg, border: `1px solid ${COLORS.border}`, borderRadius: 10, width: 38, height: 38, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center" }}>🔔
                {notifications.length > 0 && <span style={{ position: "absolute", top: 6, right: 6, width: 8, height: 8, background: COLORS.danger, borderRadius: "50%" }} />}
              </button>
            </div>
          </div>
        </header>

        <main style={{ maxWidth: 1200, margin: "0 auto", padding: "32px 24px" }}>
          {page === "browse" && !selectedEvent && (
            <div>
              <div style={{ marginBottom: 32 }}>
                <h1 style={{ fontFamily: "'Syne', sans-serif", fontSize: 36, fontWeight: 800, margin: "0 0 8px", color: COLORS.text }}>Discover Events</h1>
                <p style={{ fontFamily: "'DM Sans', sans-serif", color: COLORS.muted, fontSize: 16 }}>Find and book events that matter to you</p>
              </div>

              <div style={{ background: COLORS.card, borderRadius: 16, border: `1px solid ${COLORS.border}`, padding: 20, marginBottom: 28 }}>
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 1fr", gap: 12 }}>
                  <input value={filters.search} onChange={e => setFilters(f => ({ ...f, search: e.target.value }))} placeholder="🔍 Search events..." style={{ padding: "10px 14px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 14, outline: "none", background: COLORS.bg }} />
                  <select value={filters.category} onChange={e => setFilters(f => ({ ...f, category: e.target.value }))} style={{ padding: "10px 12px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 13, background: COLORS.bg, color: COLORS.text }}>
                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                  </select>
                  <input value={filters.city} onChange={e => setFilters(f => ({ ...f, city: e.target.value }))} placeholder="📍 City" style={{ padding: "10px 14px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 13, outline: "none", background: COLORS.bg }} />
                  <select value={filters.type} onChange={e => setFilters(f => ({ ...f, type: e.target.value }))} style={{ padding: "10px 12px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 13, background: COLORS.bg, color: COLORS.text }}>
                    <option value="all">All Types</option>
                    <option value="physical">Physical</option>
                    <option value="online">Online</option>
                  </select>
                  <select value={filters.price} onChange={e => setFilters(f => ({ ...f, price: e.target.value }))} style={{ padding: "10px 12px", borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontFamily: "'DM Sans', sans-serif", fontSize: 13, background: COLORS.bg, color: COLORS.text }}>
                    <option value="all">All Prices</option>
                    <option value="free">Free</option>
                    <option value="paid">Paid</option>
                  </select>
                </div>
              </div>

              <div style={{ marginBottom: 16, fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: COLORS.muted }}>
                Showing <strong style={{ color: COLORS.text }}>{filteredEvents.length}</strong> events
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
                {filteredEvents.map(e => (
                  <EventCard key={e.id} event={e} onClick={() => setSelectedEvent(e)} wishlisted={wishlist.includes(e.id)} onWishlist={toggleWishlist} />
                ))}
              </div>
              {filteredEvents.length === 0 && (
                <div style={{ textAlign: "center", padding: 60 }}>
                  <div style={{ fontSize: 48, marginBottom: 16 }}>🔍</div>
                  <h3 style={{ fontFamily: "'Syne', sans-serif" }}>No events found</h3>
                  <p style={{ color: COLORS.muted, fontFamily: "'DM Sans', sans-serif" }}>Try adjusting your filters</p>
                </div>
              )}
            </div>
          )}

          {page === "browse" && selectedEvent && (
            <EventDetail event={selectedEvent} onBack={() => setSelectedEvent(null)} onRegister={(event, tickets, total) => { setCheckoutData({ event, tickets, total }); setShowCheckout(true); }} wishlisted={wishlist.includes(selectedEvent.id)} onWishlist={toggleWishlist} />
          )}

          {page === "tickets" && <MyTickets bookings={bookings} />}

          {page === "wishlist" && (
            <div>
              <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, fontWeight: 800, marginBottom: 24 }}>My Wishlist</h2>
              {wishlist.length === 0 ? (
                <div style={{ textAlign: "center", padding: 60 }}>
                  <div style={{ fontSize: 48, marginBottom: 16 }}>🤍</div>
                  <h3 style={{ fontFamily: "'Syne', sans-serif" }}>No wishlisted events</h3>
                  <p style={{ color: COLORS.muted, fontFamily: "'DM Sans', sans-serif" }}>Heart events while browsing to save them here.</p>
                </div>
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
                  {events.filter(e => wishlist.includes(e.id)).map(e => (
                    <EventCard key={e.id} event={e} onClick={() => { setSelectedEvent(e); setPage("browse"); }} wishlisted={true} onWishlist={toggleWishlist} />
                  ))}
                </div>
              )}
            </div>
          )}

          {page === "organiser" && <OrganiserDashboard events={events} />}
          {page === "ai" && <AIRecommendations events={events} wishlist={wishlist} bookings={bookings} />}
        </main>

        <CheckoutModal
          open={showCheckout}
          onClose={() => setShowCheckout(false)}
          event={checkoutData?.event}
          tickets={checkoutData?.tickets}
          total={checkoutData?.total}
          onConfirm={() => {
            if (checkoutData) {
              const qr = `ES-${checkoutData.event.id}-${Date.now()}`;
              setBookings(b => [...b, { eventName: checkoutData.event.name, date: checkoutData.event.date, tickets: checkoutData.tickets, total: checkoutData.total, qrCode: qr }]);
            }
          }}
        />
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<EventSphere />);
</script>
</body>
</html>
